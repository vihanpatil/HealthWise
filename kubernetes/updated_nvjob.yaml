apiVersion: v1
kind: Pod
metadata:
  name: embedqa-gpu
spec:
  runtimeClassName: nvidia            # if your cluster uses the NVIDIA runtime; otherwise remove
  imagePullSecrets:
    - name: ngc-secret                # registry creds for nvcr.io (see commands below)

  containers:
    - name: embedqa-container
      image: lfaris1234/rootwise-nim-app:latest
      imagePullPolicy: Always

      resources:
        limits:
          nvidia.com/gpu: 1           # GPU via NVIDIA device plugin
          cpu: "2"
          memory: "16Gi"
        requests:
          nvidia.com/gpu: 1           # optional but fine to mirror the limit
          cpu: "1"                    # request at least 1 core
          memory: "8Gi"               # request at least 8Gi (adjust as needed)

      command: ["/bin/bash"]
      args: ["-c", "sleep infinity"]

      volumeMounts:
        - name: app-volume
          mountPath: /app/data

      envFrom:
        - secretRef:
            name: api-env-secrets

  volumes:
    - name: app-volume
      persistentVolumeClaim:
        claimName: rootwise-pvc
